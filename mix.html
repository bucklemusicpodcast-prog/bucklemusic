<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>In The Mix - Buckle Music</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Orbitron',sans-serif;color:white;background:url("fondo.jpg") center/cover fixed;}
.topbar{position:fixed;top:0;left:0;width:100%;height:55px;display:flex;align-items:center;justify-content:space-between;padding:0 15px;z-index:1000;background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);}
.topbar-left{display:flex;align-items:center;}
.topbar-left img{width:40px;margin-right:10px;}
.topbar-left .title{color:#00ffe0;font-size:18px;}
.topbar .social{display:flex;gap:10px;margin-right:20px;}
.sidebar{position:fixed;top:0;left:-260px;width:260px;height:100%;background:rgba(0,0,0,0.4);backdrop-filter:blur(15px);padding:20px;transition:0.4s;z-index:999;}
.sidebar a{display:block;color:white;padding:14px;text-decoration:none;border-radius:8px;margin-bottom:8px;}
.sidebar a:hover{background:#00ffe0;color:black;}
.menu-btn{font-size:26px;cursor:pointer;position:fixed;top:15px;left:15px;z-index:1001;}
.overlay-menu{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:none;z-index:998;}
.section{padding:10px 20px;margin-top:70px;}
h2{color:#00ffe0;font-size:34px;padding-left:20px;margin-bottom:10px;text-shadow:2px 2px 10px #000;}
.carousel{display:flex;overflow-x:auto;gap:20px;padding-left:20px;}
.card{position:relative;}
.card img{width:150px;border-radius:12px;}
.numero{position:absolute;top:6px;left:6px;background:rgba(0,0,0,0.8);color:#00ffe0;font-size:14px;padding:4px 8px;border-radius:6px;font-weight:bold;}
</style>
</head>

<body>

<div class="topbar">
  <div class="topbar-left">
    <img src="logo-512.png">
    <span class="title">Buckle Music</span>
  </div>
  <div class="social">
    <a href="https://www.youtube.com/@BUKLEEMUSIC/streams" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png"></a>
    <a href="https://www.instagram.com/bucklemusic" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384063.png"></a>
    <a href="https://www.facebook.com" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384053.png"></a>
    <a href="https://go.ivoox.com/sq/2535828" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/5968/5968389.png"></a>
  </div>
</div>

<div class="sidebar" id="sidebar">
  <a href="index.html">Inicio</a>
  <a href="nuevo.html">Nuevo Programa</a>
  <a href="programas.html">Programas Buckle</a>
  <a href="mix.html">In The Mix</a>
  <a href="reserva.html">Gran Reserva</a>
  <a href="pro.html">Producciones</a>
  <a href="contacto.html">Contacto</a>
</div>

<div class="menu-btn" onclick="openMenu()">☰</div>
<div class="overlay-menu" id="overlay" onclick="closeMenu()"></div>

<div class="section">
  <h2>In The Mix</h2>
  <div class="carousel" id="c3"></div>
</div>

<script>
function openMenu(){sidebar.style.left="0";overlay.style.display="block";}
function closeMenu(){sidebar.style.left="-260px";overlay.style.display="none";}

fetch(`https://archive.org/advancedsearch.php?q=creator:buckle_music AND mediatype:audio&fl[]=identifier,section&rows=50&output=json`)
.then(r=>r.json())
.then(data=>{
  data.response.docs.forEach(item=>{
    if(item.section==="mix"){
      const card=document.createElement("div");card.className="card";
      const img=document.createElement("img");
      img.src=`https://archive.org/services/img/${item.identifier}`;
      img.onclick=()=>window.open(`https://archive.org/embed/${item.identifier}`,"_blank");

      const num=document.createElement("div");
      num.className="numero";
      num.innerText=item.identifier.match(/\d+/g)?.pop()||"";

      card.appendChild(img);
      card.appendChild(num);
      c3.appendChild(card);
    }
  });
});
</script>

</body>
</html>
