<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mix</title>
<style>
body{background:black;color:white;font-family:sans-serif;}
.card{display:flex;margin:10px;background:#111;padding:8px;}
.card img{width:90px;border-radius:10px;}
</style>
</head>

<body>

<h2>In The Mix</h2>
<div id="c"></div>

<div id="miniPlayer">
<img id="miniCover">
<div id="miniTitle"></div>
<button id="playBtn">▶</button>
<audio id="audio"></audio>
</div>

<script>
const audio=document.getElementById("audio");
const cover=document.getElementById("miniCover");
const title=document.getElementById("miniTitle");
const btn=document.getElementById("playBtn");

window.onload=()=>{
const id=localStorage.getItem("track");
const time=localStorage.getItem("time");

if(id){
audio.src=`https://archive.org/download/${id}/${id}.mp3`;
cover.src=`https://archive.org/services/img/${id}`;
title.innerText=id;
audio.currentTime=time||0;
audio.play();
btn.innerText="⏸";
}
};

btn.onclick=()=>{audio.paused?audio.play():audio.pause();};

audio.ontimeupdate=()=>{
localStorage.setItem("time",audio.currentTime);
};

function playTrack(id){
audio.src=`https://archive.org/download/${id}/${id}.mp3`;
cover.src=`https://archive.org/services/img/${id}`;
title.innerText=id;
localStorage.setItem("track",id);
localStorage.setItem("time",0);
audio.play();
}

fetch(`https://archive.org/advancedsearch.php?q=creator:buckle_music&output=json`)
.then(r=>r.json())
.then(data=>{
data.response.docs.forEach(item=>{
if(item.section==="mix"){
const img=document.createElement("img");
img.src=`https://archive.org/services/img/${item.identifier}`;
img.onclick=()=>playTrack(item.identifier);

const card=document.createElement("div");
card.className="card";
card.appendChild(img);

c.appendChild(card);
}
});
});
</script>

</body>
</html>
