<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reproductor</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:sans-serif;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
}

img{
  width:250px;
  border-radius:15px;
  margin-bottom:20px;
}

audio{
  width:90%;
}

a{
  margin-top:20px;
  color:#00ffe0;
  text-decoration:none;
}
</style>
</head>

<body>

<img id="cover">
<h2 id="title"></h2>

<audio id="audio" controls autoplay></audio>

<a href="index.html">⬅ Volver</a>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const audio = document.getElementById("audio");
const cover = document.getElementById("cover");
const title = document.getElementById("title");

/* Cargar contenido */
cover.src = `https://archive.org/services/img/${id}`;
audio.src = `https://archive.org/download/${id}/${id}.mp3`;
title.innerText = id;

/* Guardar progreso */
audio.addEventListener("timeupdate",()=>{
  localStorage.setItem("time_"+id, audio.currentTime);
});

/* Recuperar progreso */
audio.addEventListener("loadedmetadata",()=>{
  const t = localStorage.getItem("time_"+id);
  if(t){
    audio.currentTime = t;
  }
});
</script>

</body>
</html>
