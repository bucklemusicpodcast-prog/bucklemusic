<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reproductor</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:black;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.player{
  text-align:center;
}

img{
  width:250px;
  border-radius:12px;
  margin-bottom:20px;
}

button{
  padding:10px 20px;
  font-size:18px;
  background:#00ffe0;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="player">
  <img id="cover">
  <h2 id="title"></h2>
  <audio id="audio" controls></audio>
  <br><br>
  <button onclick="history.back()">⬅ Volver</button>
</div>

<script>
// obtener id
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

// elementos
const audio = document.getElementById("audio");
const cover = document.getElementById("cover");
const title = document.getElementById("title");

// portada
cover.src = `https://archive.org/services/img/${id}`;
title.innerText = id;

// 🔥 buscar mp3 automáticamente
fetch(`https://archive.org/metadata/${id}`)
.then(res=>res.json())
.then(data=>{
  const file = data.files.find(f => f.name.endsWith(".mp3"));

  if(file){
    audio.src = `https://archive.org/download/${id}/${file.name}`;
  } else {
    title.innerText = "❌ No se encontró audio";
  }
});
</script>

</body>
</html>
