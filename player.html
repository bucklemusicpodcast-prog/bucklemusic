<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reproductor - Buckle Music</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Orbitron', sans-serif;
  background:url("fondo.jpg") center/cover fixed;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

/* OSCURECER */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  z-index:0;
}

/* CONTENEDOR */
.player{
  position:relative;
  z-index:1;
  text-align:center;
}

.player img{
  width:300px;
  border-radius:15px;
  margin-bottom:20px;
}

.player iframe{
  width:90vw;
  max-width:500px;
  height:90px;
  border:none;
}

/* BOTON VOLVER */
.back{
  position:absolute;
  top:20px;
  left:20px;
  font-size:20px;
  cursor:pointer;
  z-index:2;
  color:#00ffe0;
}
</style>
</head>

<body>

<div class="back" onclick="history.back()">← Volver</div>

<div class="player">
  <img id="cover">
  <iframe id="frame"></iframe>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if(id){
  document.getElementById("cover").src = `https://archive.org/services/img/${id}`;
  document.getElementById("frame").src = `https://archive.org/embed/${id}`;
}
</script>

</body>
</html>
