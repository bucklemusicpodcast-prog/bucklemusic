<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Buckle Music</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="logo-512.png">

<style>

body{
margin:0;
font-family:Arial;
color:white;

background-image:url("fondo.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.70);
z-index:-1;
}

header{
text-align:center;
padding:20px;
}

header img{
width:70px;
}

h1{
color:#00ffe0;
margin:5px;
font-size:22px;
}

.tagline{
font-size:12px;
color:#aaa;
}

.section{
max-width:900px;
margin:auto;
padding:10px;
}

.program{
display:flex;
align-items:center;
background:#111;
border-radius:10px;
padding:10px;
margin-bottom:10px;
gap:10px;
}

.program img{
width:90px;
border-radius:6px;
cursor:pointer;
}

.program-info{
flex:1;
}

.program-title{
font-size:14px;
margin-bottom:6px;
}

.player{
margin-top:10px;
display:none;
}

iframe{
width:100%;
height:60px;
border:none;
}

.links{
margin-top:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.links button{
padding:12px;
border:none;
border-radius:10px;
background:#00ffe0;
font-weight:bold;
cursor:pointer;
}

.links button:hover{
background:#00cfc0;
}

</style>

</head>

<body>

<div class="overlay"></div>

<header>

<img src="logo-512.png">

<h1>BUCKLE MUSIC</h1>

<p class="tagline">
120 minutos de música electrónica
</p>

</header>


<div class="section">

<h2>Nuevo episodio</h2>

<div class="program">

<img src="https://archive.org/services/img/buckle-20-music-2026"
onclick="togglePlayer('buckle-20-music-2026')">

<div class="program-info">

<div class="program-title">
Buckle 20 Music 2026
</div>

<button onclick="togglePlayer('buckle-20-music-2026')">
▶ reproducir
</button>

<div class="player" id="player-buckle-20-music-2026"></div>

</div>

</div>

</div>



<div class="section">

<h2>Programas</h2>

<div id="programs"></div>

</div>


<div class="section">

<h2>Plataformas</h2>

<div class="links">

<a href="https://www.ivoox.com/podcast-buckle-music_sq_f12535828_1.html" target="_blank">
<button>🎧 Escuchar en iVoox</button>
</a>

<a href="https://www.youtube.com/@BUKLEEMUSIC/streams" target="_blank">
<button>▶ Directos en YouTube</button>
</a>

</div>

</div>



<script>

const collection = "buckle-2-temporada-3.0";
const container = document.getElementById("programs");


fetch(`https://archive.org/advancedsearch.php?q=collection:${collection}&fl[]=identifier,title&sort[]=publicdate+desc&rows=50&page=1&output=json`)
.then(r => r.json())
.then(data => {

data.response.docs.forEach(item => {

if(item.identifier == "buckle-20-music-2026") return;

const div = document.createElement("div");

div.className="program";

div.innerHTML = `
<img src="https://archive.org/services/img/${item.identifier}" onclick="togglePlayer('${item.identifier}')">

<div class="program-info">

<div class="program-title">${item.title}</div>

<button onclick="togglePlayer('${item.identifier}')">▶ reproducir</button>

<div class="player" id="player-${item.identifier}"></div>

</div>
`;

container.appendChild(div);

});

});


function togglePlayer(id){

const player = document.getElementById("player-"+id);

if(player.style.display=="block"){

player.style.display="none";
player.innerHTML="";

}else{

player.style.display="block";

player.innerHTML =
`<iframe src="https://archive.org/embed/${id}"></iframe>`;

}

}

</script>

</body>
</html>
