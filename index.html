<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buckle Music</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:black;
  color:white;
}

/* TOPBAR */
.topbar{
  position:fixed;
  top:0;
  width:100%;
  height:55px;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.7);
}

/* MENU */
.menu-btn{
  position:fixed;
  top:15px;
  left:15px;
  font-size:25px;
  z-index:1001;
}

.sidebar{
  position:fixed;
  left:-260px;
  width:260px;
  height:100%;
  background:black;
  padding:20px;
  transition:0.4s;
}

.sidebar a{
  display:block;
  padding:12px;
  color:white;
  text-decoration:none;
}

/* SECCIONES */
.section{padding:70px 15px 15px;}

h2{
  text-align:center;
  color:#00ffe0;
}

/* LISTA */
.carousel{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.card{
  display:flex;
  align-items:center;
  gap:10px;
}

.card img{
  width:90px;
  border-radius:10px;
}

/* PLAYER */
#miniPlayer{
  position:fixed;
  bottom:0;
  width:100%;
  background:black;
  display:flex;
  padding:8px;
}

#miniCover{width:50px;}
</style>
</head>

<body>

<div class="topbar">Buckle Music</div>

<div class="menu-btn" onclick="openMenu()">☰</div>

<div class="sidebar" id="sidebar">
<a href="index.html">🏠 Inicio</a>
<a href="index.html#nuevo">Nuevo Programa</a>
<a href="mix.html">Mix</a>
<a href="reserva.html">Reserva</a>
</div>

<div class="section">
<h2 id="nuevo">Nuevo Programa</h2>
<div id="c1" class="carousel"></div>
</div>

<script>
function openMenu(){
document.getElementById("sidebar").style.left="0";
}

const audio=new Audio();

function playTrack(id){
audio.src=`https://archive.org/download/${id}/${id}.mp3`;
audio.play();
}

fetch(`https://archive.org/advancedsearch.php?q=creator:buckle_music&output=json`)
.then(r=>r.json())
.then(data=>{
data.response.docs.forEach(item=>{
const img=document.createElement("img");
img.src=`https://archive.org/services/img/${item.identifier}`;
img.onclick=()=>playTrack(item.identifier);

const card=document.createElement("div");
card.className="card";
card.appendChild(img);

c1.appendChild(card);
});
});
</script>

</body>
</html>
