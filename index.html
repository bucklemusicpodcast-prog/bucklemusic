<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buckle Music</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Orbitron', sans-serif;
  color:white;
  background:url("fondo.jpg") center/cover fixed;
  scroll-behavior:smooth;
}

/* OSCURECER FONDO */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.55);
  z-index:0;
}

/* SPLASH */
#splash{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
#splash img{width:180px;}
#splash span{margin-top:10px;font-size:28px;color:#00ffe0;}

/* TOPBAR */
.topbar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:55px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 15px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  z-index:1000;
}

.topbar-left{
  display:flex;
  align-items:center;
}
.topbar-left img{
  width:35px;
  margin-right:10px;
}
.title{
  color:#00ffe0;
}

.topbar .social{
  display:flex;
  gap:12px;
  margin-right:20px;
}
.topbar .social img{
  width:26px;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  top:0;
  left:-260px;
  width:260px;
  height:100%;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(15px);
  padding:20px;
  transition:0.4s;
  z-index:999;
}
.sidebar a{
  display:block;
  color:white;
  padding:14px;
  text-decoration:none;
  border-radius:8px;
  margin-bottom:8px;
}
.sidebar a:hover{
  background:#00ffe0;
  color:black;
}

.overlay-menu{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  z-index:998;
}

.menu-btn{
  position:fixed;
  top:15px;
  left:15px;
  font-size:26px;
  cursor:pointer;
  z-index:1001;
}

/* SECCIONES */
.section{
  padding:10px 20px;
  margin-top:20px;
}
h2{
  color:#00ffe0;
  font-size:32px;
  padding-left:20px;
  margin-bottom:10px;
  text-shadow:0 0 10px #00ffe0;
}

/* CARRUSEL */
.carousel{
  display:flex;
  overflow-x:auto;
  gap:20px;
  padding-left:20px;
}

/* CARDS */
.card{position:relative;}

.card img{
  width:150px;
  border-radius:12px;
  cursor:pointer;
  transition:0.3s;
}
.card img:hover{transform:scale(1.08);}

/* NUEVO PROGRAMA MÁS GRANDE */
#c1 .card img{
  width:220px;
}

.numero{
  position:absolute;
  top:6px;
  left:6px;
  background:black;
  color:#00ffe0;
  padding:4px 8px;
  border-radius:6px;
}

/* PLAYER */
.player-modal{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:9999;
}
.player-modal img{width:260px;margin-bottom:20px;}
.player-modal iframe{width:90%;height:80px;border:none;}
.close{position:absolute;top:20px;right:20px;font-size:25px;cursor:pointer;}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img src="logo-512.png">
  <span>Buckle Music</span>
</div>

<!-- TOPBAR -->
<div class="topbar" id="topbar" style="display:none;">
  <div class="topbar-left">
    <img src="logo-512.png">
    <span class="title">Buckle Music</span>
  </div>

  <div class="social">
    <a href="https://www.youtube.com/@BUKLEEMUSIC/streams" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png"></a>
    <a href="https://www.instagram.com/bucklemusic" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384063.png"></a>
    <a href="https://www.facebook.com" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384053.png"></a>
    <a href="https://go.ivoox.com/sq/2535828" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/5968/5968389.png"></a>
  </div>
</div>

<!-- SIDEBAR -->
<div class="overlay-menu" id="overlay" onclick="closeMenu()"></div>

<div class="sidebar" id="sidebar">
  <a href="index.html">Inicio</a>
  <a href="nuevo.html">Nuevo Programa</a>
  <a href="programas.html">Programas Buckle</a>
  <a href="mix.html">In The Mix</a>
  <a href="reserva.html">Gran Reserva</a>
  <a href="pro.html">Producciones</a>
  <a href="contacto.html">Contacto</a>
</div>

<div class="menu-btn" onclick="openMenu()">☰</div>

<!-- CONTENIDO -->
<div id="mainContent" style="display:none;">

<div class="section">
  <h2>Nuevo Programa</h2>
  <div class="carousel" id="c1"></div>
</div>

<div class="section">
  <h2>Programas Buckle</h2>
  <div class="carousel" id="c2"></div>
</div>

<div class="section">
  <h2>In The Mix</h2>
  <div class="carousel" id="c3"></div>
</div>

<div class="section">
  <h2>Gran Reserva</h2>
  <div class="carousel" id="c4"></div>
</div>

<div class="section">
  <h2>Producciones</h2>
  <div class="carousel" id="c5"></div>
</div>

</div>

<!-- PLAYER -->
<div class="player-modal" id="modal">
  <span class="close" onclick="cerrar()">✖</span>
  <img id="cover">
  <iframe id="frame"></iframe>
</div>

<script>
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");
const topbar = document.getElementById("topbar");
const mainContent = document.getElementById("mainContent");

/* MENU */
function openMenu(){sidebar.style.left="0";overlay.style.display="block";}
function closeMenu(){sidebar.style.left="-260px";overlay.style.display="none";}

/* PLAYER */
function play(id){
  modal.style.display="flex";
  cover.src=`https://archive.org/services/img/${id}`;
  frame.src=`https://archive.org/embed/${id}`;
}
function cerrar(){
  modal.style.display="none";
  frame.src="";
}

/* SPLASH */
setTimeout(()=>{
  splash.style.display="none";
  topbar.style.display="flex";
  mainContent.style.display="block";
},1800);

/* FETCH */
fetch(`https://archive.org/advancedsearch.php?q=creator:buckle_music AND mediatype:audio&fl[]=identifier,section&rows=50&output=json`)
.then(r=>r.json())
.then(data=>{
  data.response.docs.forEach(item=>{
    const num=item.identifier.match(/\d+/g)?.pop()||"";
    const card=document.createElement("div");card.className="card";

    const img=document.createElement("img");
    img.src=`https://archive.org/services/img/${item.identifier}`;
    img.onclick=()=>play(item.identifier);

    const n=document.createElement("div");
    n.className="numero";
    n.innerText=num;

    card.appendChild(img);
    card.appendChild(n);

    if(item.section==="nuevo") c1.appendChild(card);
    if(item.section==="programas") c2.appendChild(card);
    if(item.section==="mix") c3.appendChild(card);
    if(item.section==="reserva") c4.appendChild(card);
    if(item.section==="producciones") c5.appendChild(card);
  });
});
</script>

</body>
</html>
