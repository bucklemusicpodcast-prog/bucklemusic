<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buckle Music</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#000;
  color:white;
}

/* 🔥 SPLASH PREMIUM */
#splash{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
  animation:fadeIn 1s ease;
}

#splash img{
  width:140px;
  animation:zoom 1.5s ease;
}

#splash h1{
  color:#00ffe0;
  margin-top:15px;
  font-size:28px;
  letter-spacing:2px;
  animation:fadeText 2s ease;
}

@keyframes zoom{
  0%{transform:scale(0.5);opacity:0;}
  100%{transform:scale(1);opacity:1;}
}

@keyframes fadeText{
  0%{opacity:0;}
  100%{opacity:1;}
}

@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

/* TOPBAR */
.topbar{
  position:fixed;
  top:0;
  width:100%;
  height:55px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.8);
  z-index:1000;
}

/* MENU */
.menu-btn{
  position:fixed;
  top:15px;
  left:15px;
  font-size:25px;
  z-index:1001;
  cursor:pointer;
}

.sidebar{
  position:fixed;
  left:-260px;
  top:0;
  width:260px;
  height:100%;
  background:black;
  padding:20px;
  transition:0.3s;
  z-index:999;
}

.sidebar a{
  display:block;
  padding:12px;
  color:white;
  text-decoration:none;
}

.sidebar a:hover{
  background:#00ffe0;
  color:black;
}

/* CONTENIDO */
.section{
  padding:70px 15px 15px;
}

/* 🔥 TITULOS PRO */
h2{
  text-align:center;
  font-size:32px;
  margin-bottom:10px;

  background:linear-gradient(90deg,#00ffe0,#00aaff,#00ffe0);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  text-shadow:
    0 0 10px rgba(0,255,224,0.8),
    0 0 20px rgba(0,170,255,0.6);

  letter-spacing:1px;
}

/* LISTA */
.carousel{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.card{
  display:flex;
  align-items:center;
  gap:12px;
  background:#111;
  padding:8px;
  border-radius:10px;
}

.card img{
  width:90px;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- 🔥 SPLASH -->
<div id="splash">
  <img src="logo-512.png">
  <h1>Buckle Music</h1>
</div>

<!-- TOPBAR -->
<div class="topbar">Buckle Music</div>

<!-- MENU -->
<div class="menu-btn" onclick="openMenu()">☰</div>

<div class="sidebar" id="sidebar">
  <a href="index.html">🏠 Inicio</a>
  <a href="#nuevo">Nuevo Programa</a>
  <a href="mix.html">In The Mix</a>
  <a href="reserva.html">Gran Reserva</a>
</div>

<!-- CONTENIDO -->
<div class="section">
  <h2 id="nuevo">Nuevo Programa</h2>
  <div id="c1" class="carousel"></div>
</div>

<script>
const sidebar = document.getElementById("sidebar");

function openMenu(){
  sidebar.style.left="0";
}

/* 🔥 SPLASH */
setTimeout(()=>{
  const splash = document.getElementById("splash");
  splash.style.opacity="0";
  splash.style.transition="0.5s";
  setTimeout(()=>{ splash.style.display="none"; },500);
},1800);

/* FETCH */
fetch(`https://archive.org/advancedsearch.php?q=creator:buckle_music&output=json`)
.then(r=>r.json())
.then(data=>{
  data.response.docs.forEach(item=>{

    const card=document.createElement("div");
    card.className="card";

    const img=document.createElement("img");
    img.src=`https://archive.org/services/img/${item.identifier}`;

    img.onclick=()=>{
      window.location.href=`player.html?id=${item.identifier}`;
    };

    card.appendChild(img);
    c1.appendChild(card);

  });
});
</script>

</body>
</html>
