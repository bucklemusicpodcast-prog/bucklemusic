<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buckle Music</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="logo-512.png">

<style>

body{
margin:0;
font-family:Arial;
color:white;
background: linear-gradient(270deg,#000,#001f1f,#000,#002a2a);
background-size:400% 400%;
animation:fondo 10s ease infinite;
}

@keyframes fondo{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

header{
text-align:center;
padding:20px;
}

header img{
width:70px;
}

h1{
color:#00ffe0;
font-size:22px;
margin:5px;
}

.tagline{
color:#aaa;
font-size:12px;
}

.section{
max-width:900px;
margin:auto;
padding:10px;
}

.program{
background:#111;
padding:10px;
border-radius:10px;
margin-bottom:10px;
text-align:center;
}

.program img{
width:80px;
border-radius:6px;
}

.program-title{
font-size:13px;
margin:5px;
}

.links{
margin-top:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.links button{
padding:12px;
border:none;
border-radius:10px;
background:#00ffe0;
font-weight:bold;
cursor:pointer;
}

.links button:hover{
background:#00cfc0;
}

.player-floating{
position:fixed;
bottom:15px;
right:15px;
width:45px;
height:45px;
border-radius:50%;
background:#00ffe0;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:20px;
z-index:999;
}

.player-expanded{
position:fixed;
bottom:0;
left:0;
right:0;
background:#000;
padding:10px;
display:none;
flex-direction:column;
align-items:center;
z-index:998;
}

iframe{
width:100%;
height:60px;
border:none;
}

.close-btn{
margin-top:5px;
padding:6px 10px;
border:none;
border-radius:6px;
background:#00ffe0;
cursor:pointer;
}

</style>
</head>

<body>

<header>

<img src="logo-512.png">

<h1>BUCKLE MUSIC</h1>

<p class="tagline">120 minutos de música electrónica</p>

</header>


<!-- NUEVO EPISODIO -->

<div class="section">

<h2>Nuevo episodio</h2>

<div class="program">

<img src="https://archive.org/services/img/buckle-20-music-2026">

<div class="program-title">
Buckle 20 Music 2026
</div>

<button onclick="playProgram('buckle-20-music-2026')">
▶ Reproducir
</button>

</div>

</div>


<!-- PROGRAMAS AUTOMÁTICOS -->

<div class="section">

<h2>Programas</h2>

<div id="programs"></div>

</div>


<!-- BOTONES -->

<div class="section">

<h2>Plataformas</h2>

<div class="links">

<a href="https://www.ivoox.com/podcast-buckle-music_sq_f12535828_1.html" target="_blank">
<button>🎧 Escuchar en iVoox</button>
</a>

<a href="https://www.youtube.com/@BUKLEEMUSIC/streams" target="_blank">
<button>▶ Directos en YouTube</button>
</a>

</div>

</div>



<!-- PLAYER FLOTANTE -->

<div class="player-floating" id="openPlayer">
🎵
</div>


<div class="player-expanded" id="playerBox">

<div id="player"></div>

<button class="close-btn" onclick="closePlayer()">
Cerrar
</button>

</div>



<script>


const collection = "buckle-2-temporada-3.0";
const container = document.getElementById("programs");


fetch(`https://archive.org/advancedsearch.php?q=collection:${collection}&fl[]=identifier,title&sort[]=publicdate+desc&rows=50&page=1&output=json`)
.then(r => r.json())
.then(data => {

data.response.docs.forEach(item => {

if(item.identifier == "buckle-20-music-2026") return;

const div = document.createElement("div");

div.className="program";

div.innerHTML = `
<img src="https://archive.org/services/img/${item.identifier}">
<div class="program-title">${item.title}</div>
<button onclick="playProgram('${item.identifier}')">▶ Reproducir</button>
`;

container.appendChild(div);

});

});


function playProgram(id){

document.getElementById("player").innerHTML =
`<iframe src="https://archive.org/embed/${id}"></iframe>`;

document.getElementById("playerBox").style.display="flex";
document.getElementById("openPlayer").style.display="none";

}


document.getElementById("openPlayer").onclick=function(){

document.getElementById("playerBox").style.display="flex";
this.style.display="none";

}


function closePlayer(){

document.getElementById("playerBox").style.display="none";
document.getElementById("openPlayer").style.display="flex";

}

</script>

</body>
</html>
