<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buckle Music</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00ffe0">
<link rel="apple-touch-icon" href="logo-192.png">

<style>
body{
  margin:0;
  font-family:'Orbitron',sans-serif;
  color:white;
  background:url("fondo.jpg") center/cover fixed;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
}

/* SPLASH */
#splash{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
#splash img{width:140px;}
#splash span{
  margin-top:10px;
  color:#00ffe0;
  font-size:24px;
}

/* TOPBAR */
.topbar{
  position:fixed;
  top:0;
  width:100%;
  height:55px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  z-index:1000;
}
.topbar-left{display:flex;align-items:center;}
.topbar-left img{width:32px;margin-right:8px;}
.title{color:#00ffe0;font-size:16px;}

.social{
  display:flex;
  gap:12px;
  margin-right:20px;
}
.social img{width:22px;}

/* SIDEBAR */
.sidebar{
  position:fixed;
  left:-260px;
  width:260px;
  height:100%;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(15px);
  padding:20px;
  transition:.4s;
  z-index:999;
}
.sidebar a{
  display:block;
  padding:12px;
  color:white;
  text-decoration:none;
  border-radius:8px;
}
.sidebar a:hover{
  background:#00ffe0;
  color:black;
}
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  z-index:998;
}
.menu-btn{
  position:fixed;
  top:14px;
  left:15px;
  font-size:26px;
  z-index:1001;
  cursor:pointer;
}

/* SECCIONES */
.section{
  display:none;
  padding:70px 15px 10px;
}
.section.active{display:block;}

h2{
  text-align:center;
  color:#00ffe0;
  font-size:22px;
  margin:10px 0;
  text-shadow:0 0 8px #00ffe0;
}

/* CARRUSEL */
.carousel{
  display:flex;
  justify-content:center;
  gap:15px;
  overflow-x:auto;
  scroll-behavior:smooth;
}
.carousel::-webkit-scrollbar{display:none;}

.card{position:relative;}

.card img{
  width:160px;
  border-radius:12px;
  cursor:pointer;
  transition:.3s;
}
.card img:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #00ffe0;
}

.numero{
  position:absolute;
  top:5px;
  left:5px;
  background:black;
  color:#00ffe0;
  padding:3px 6px;
  border-radius:5px;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img src="logo-512.png">
  <span>Buckle Music</span>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <img src="logo-512.png">
    <span class="title">Buckle Music</span>
  </div>
</div>

<!-- SIDEBAR -->
<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="sidebar" id="sidebar">
  <a href="#" data-sec="inicio">Inicio</a>
  <a href="#" data-sec="nuevo">Nuevo Programa</a>
  <a href="#" data-sec="programas">Programas Buckle</a>
</div>

<div class="menu-btn" onclick="openMenu()">☰</div>

<!-- CONTENIDO -->
<div id="app">

<div class="section active" id="inicio">
  <h2>Nuevo Programa</h2>
  <div class="carousel" id="c1"></div>
</div>

<div class="section" id="nuevo"><h2>Nuevo Programa</h2><div class="carousel" id="c2"></div></div>
<div class="section" id="programas"><h2>Programas Buckle</h2><div class="carousel" id="c3"></div></div>

</div>

<script>
// MENU
const sidebar=document.getElementById("sidebar");
const overlay=document.getElementById("overlay");

function openMenu(){
  sidebar.style.left="0";
  overlay.style.display="block";
}
function closeMenu(){
  sidebar.style.left="-260px";
  overlay.style.display="none";
}

// SECCIONES
const sections=document.querySelectorAll(".section");
document.querySelectorAll(".sidebar a").forEach(link=>{
  link.onclick=(e)=>{
    e.preventDefault();
    const id=link.dataset.sec;
    sections.forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    closeMenu();
  }
});

// SPLASH
setTimeout(()=>{
  document.getElementById("splash").style.display="none";
},1200);

// FETCH
fetch(`https://archive.org/advancedsearch.php?q=creator:buckle_music AND mediatype:audio&fl[]=identifier&rows=50&output=json`)
.then(r=>r.json())
.then(data=>{
  data.response.docs.forEach(item=>{
    const c=document.getElementById("c1");

    const card=document.createElement("div");
    card.className="card";

    const img=document.createElement("img");
    img.src=`https://archive.org/services/img/${item.identifier}`;
    img.onclick=()=>window.location.href=`player.html?id=${item.identifier}`;

    card.appendChild(img);
    c.appendChild(card);
  });
});

// SERVICE WORKER
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js");
  });
}
</script>

</body>
</html>
