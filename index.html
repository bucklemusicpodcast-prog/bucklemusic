<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buckle Music</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron', sans-serif;
color:white;
background:url("fondo.jpg") center/cover fixed;
}

.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
z-index:-1;
}

header{
text-align:center;
padding:15px;
}

header img{width:60px;}

h1{
color:#00ffe0;
margin:5px;
font-size:22px;
}

/* REDES */

.social{
display:flex;
justify-content:center;
gap:15px;
margin:10px 0;
}

.social img{
width:30px;
transition:0.3s;
}

.social img:hover{
transform:scale(1.2);
filter:drop-shadow(0 0 8px #00ffe0);
}

/* BOTON DIRECTO */

.live{
text-align:center;
margin:10px;
}

.live a{
background:red;
color:white;
padding:8px 15px;
border-radius:20px;
text-decoration:none;
font-size:14px;
box-shadow:0 0 10px red;
}

/* CARRUSEL PRO */

.carousel{
overflow:hidden;
padding:15px;
}

.track{
display:flex;
gap:15px;
animation:scroll 30s linear infinite;
}

.track img{
width:130px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.track img:hover{
transform:scale(1.2);
box-shadow:0 0 10px #00ffe0;
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

/* PLAYER PRO */

.player{
position:fixed;
bottom:0;
width:100%;
background:#000;
display:none;
padding:5px;
box-shadow:0 -2px 10px #000;
}

.player iframe{
width:100%;
height:60px;
border:none;
}

</style>
</head>

<body>

<div class="overlay"></div>

<header>
<img src="logo-512.png">
<h1>Buckle Music</h1>
</header>

<!-- REDES -->

<div class="social">

<a href="https://www.youtube.com/@BUKLEEMUSIC/streams" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
</a>

<a href="https://www.instagram.com/bucklemusic" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/1384/1384063.png">
</a>

<a href="https://www.facebook.com" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/1384/1384053.png">
</a>

<a href="https://go.ivoox.com/sq/2535828" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4a/Ivoox_logo.svg/512px-Ivoox_logo.svg.png">
</a>

</div>

<!-- DIRECTO -->

<div class="live">
<a href="https://www.youtube.com/@BUKLEEMUSIC/streams" target="_blank">
🔴 EN DIRECTO
</a>
</div>

<!-- CARRUSEL -->

<div class="carousel">
<div class="track" id="track"></div>
</div>

<!-- PLAYER -->

<div class="player" id="player">
<iframe id="frame"></iframe>
</div>

<script>

let lastEpisode=null;

fetch(`https://archive.org/advancedsearch.php?q=creator:buckle_music AND mediatype:audio&fl[]=identifier&sort[]=publicdate desc&rows=50&output=json`)
.then(r=>r.json())
.then(data=>{

const track=document.getElementById("track");

let items=[];

data.response.docs.forEach((item,index)=>{

if(index===0) lastEpisode=item.identifier;

const img=document.createElement("img");

img.src=`https://archive.org/services/img/${item.identifier}`;

img.onclick=()=>play(item.identifier);

items.push(img);

});

// duplicar para infinito
items.concat(items).forEach(el=>track.appendChild(el));

// 🔥 AUTO PLAY último episodio
setTimeout(()=>{
if(lastEpisode) play(lastEpisode);
},1500);

});

function play(id){

const player=document.getElementById("player");
const frame=document.getElementById("frame");

frame.src=`https://archive.org/embed/${id}`;

player.style.display="block";

}

</script>

</body>
</html>
