<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Buckle Music</title>

<style>

body{
background: linear-gradient(270deg,#000000,#001f1f,#000000,#002a2a);
background-size:400% 400%;
animation: fondo 8s ease infinite;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

@keyframes fondo{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}
}
}

header{
padding:40px;
}

h1{
color:#00ffe0;
font-size:48px;
}

.player{
margin-top:40px;
}

audio{
width:80%;
margin-top:20px;
}

button{
background:#00ffe0;
border:none;
padding:15px 25px;
font-size:18px;
border-radius:10px;
cursor:pointer;
}

button:hover{
background: linear-gradient(270deg,#000000,#111,#001f1f,#000);
background-size:600% 600%;
animation: fondo 10s ease infinite;
}

</style>

</head>

<body>

<header>

<h1>BUCKLE MUSIC</h1>

<p>120 minutos de música electrónica cada semana</p>

</header>

<div class="player">

<h2>Último programa</h2>

<audio controls>

<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">

</audio>

</div>

</body>
</html>
