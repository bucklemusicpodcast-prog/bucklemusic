<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Buckle Music</title>

<!-- Manifest para PWA -->
<link rel="manifest" href="manifest.json">

<!-- Particles.js para fondo animado tipo discoteca -->
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<style>
body{
  background:black;
  color:white;
  font-family:Arial;
  text-align:center;
  margin:0;
  overflow-x:hidden;
}

#particles-js{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
  top:0;
  left:0;
}

header{
  padding:40px;
}

h1{
  color:#00ffe0;
  font-size:50px;
}

.player{
  margin-top:40px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

audio{
  width:90%;
  max-width:700px;
  margin-top:20px;
}

.section{
  margin-top:60px;
}

.episode{
  background:#111;
  margin:20px auto;
  padding:20px;
  border-radius:10px;
  max-width:700px;
}

iframe{
  border:none;
  border-radius:10px;
  margin-top:20px;
}
</style>
</head>
<body>

<!-- Partículas de fondo -->
<div id="particles-js"></div>

<header>
<h1>BUCKLE MUSIC</h1>
<p>120 minutos de música electrónica cada semana</p>
</header>

<div class="player">
<h2>Último programa</h2>
<audio controls>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>
</div>

<div class="section">
<h2>🎧 Últimos episodios</h2>
<!-- Aquí se añadirán automáticamente los episodios de iVoox -->
</div>

<div class="section">
<h2>🎧 Escucha en iVoox</h2>
<iframe src="https://www.ivoox.com/player_es_podcast_2535828_zp_1.html?c1=20cbda" 
        width="100%" 
        height="400" 
        allowfullscreen="" 
        scrolling="no" 
        loading="lazy">
</iframe>
</div>

<script>
// Inicializar particles.js
particlesJS("particles-js", {
  "particles": {
    "number": { "value": 80 },
    "color": { "value": "#00ffe0" },
    "shape": { "type": "circle" },
    "opacity": { "value": 0.5 },
    "size": { "value": 3 },
    "line_linked": { "enable": true, "distance": 150, "color": "#00ffe0", "opacity": 0.4, "width": 1 }
  }
});

// Cargar episodios automáticos desde iVoox RSS
const feedUrl = "https://www.ivoox.com/podcast-buckle-music_sq_f12535828_1.xml";
fetch(feedUrl)
  .then(response => response.text())
  .then(str => new window.DOMParser().parseFromString(str,"text/xml"))
  .then(data => {
    const items = data.querySelectorAll("item");
    const container = document.querySelector(".section");
    items.forEach((item,i)=>{
      if(i>=5) return; // últimos 5 episodios
      const title = item.querySelector("title").textContent;
      const mp3 = item.querySelector("enclosure").getAttribute("url");
      const div = document.createElement("div");
      div.classList.add("episode");
      div.innerHTML = `<strong>${title}</strong><br><br><audio controls src="${mp3}"></audio>`;
      container.appendChild(div);
    });
  });

// Notificaciones cuando hay nuevos episodios
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/service-worker.js')
    .then(reg=>console.log('Service Worker registrado', reg));
}

function notify(title="Nuevo programa Buckle Music 🎧"){
  if(Notification.permission==="granted"){
    new Notification(title);
  } else if(Notification.permission!=="denied"){
    Notification.requestPermission().then(permission=>{
      if(permission==="granted") notify(title);
    });
  }
}
</script>
</body>
</html>
