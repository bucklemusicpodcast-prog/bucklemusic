<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buckle Music</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Orbitron',sans-serif;
  color:white;
  background:url("fondo.jpg") center/cover fixed;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
}

/* SPLASH */
#splash{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
#splash img{width:140px;}
#splash span{
  margin-top:10px;
  color:#00ffe0;
  font-size:24px;
}

/* TOPBAR */
.topbar{
  position:fixed;
  top:0;
  width:100%;
  height:55px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  z-index:1000;
}
.topbar-left{display:flex;align-items:center;}
.topbar-left img{width:32px;margin-right:8px;}
.title{color:#00ffe0;font-size:16px;}

.social{
  display:flex;
  gap:12px;
  margin-right:20px;
}
.social img{width:22px;}

/* SIDEBAR */
.sidebar{
  position:fixed;
  left:-260px;
  width:260px;
  height:100%;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(15px);
  padding:20px;
  transition:.4s;
  z-index:999;
}
.sidebar a{
  display:block;
  padding:12px;
  color:white;
  text-decoration:none;
  border-radius:8px;
}
.sidebar a:hover{
  background:#00ffe0;
  color:black;
}
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  z-index:998;
}
.menu-btn{
  position:fixed;
  top:14px;
  left:15px;
  font-size:26px;
  z-index:1001;
  cursor:pointer;
}

/* SECCIONES */
.section{
  display:none;
  padding:70px 15px 10px;
}
.section.active{display:block;}

h2{
  text-align:center;
  color:#00ffe0;
  font-size:22px;
  margin:10px 0;
  text-shadow:0 0 8px #00ffe0;
}

/* CARRUSEL */
.carousel{
  display:flex;
  justify-content:center;
  gap:15px;
  overflow-x:auto;
}
.carousel::-webkit-scrollbar{display:none;}

.card{position:relative;}
.card img{
  width:200px;
  border-radius:12px;
  cursor:pointer;
}

/* NUMERO */
.numero{
  position:absolute;
  top:5px;
  left:5px;
  background:black;
  color:#00ffe0;
  padding:3px 6px;
  border-radius:5px;
}

/* CONTACTO */
.contacto{
  text-align:center;
  margin-top:20px;
  color:#00ffe0;
}
.contacto span{
  display:block;
  color:white;
  margin-top:5px;
  font-size:14px;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img src="logo-512.png">
  <span>Buckle Music</span>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <img src="logo-512.png">
    <span class="title">Buckle Music</span>
  </div>

  <div class="social">
    <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png"></a>
    <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384063.png"></a>
    <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384053.png"></a>
  </div>
</div>

<!-- SIDEBAR -->
<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="sidebar" id="sidebar">
  <a href="#" data-sec="inicio">Inicio</a>
  <a href="#" data-sec="nuevo">Nuevo Programa</a>
  <a href="#" data-sec="programas">Programas Buckle</a>
  <a href="#" data-sec="mix">In The Mix</a>
  <a href="#" data-sec="reserva">Gran Reserva</a>
  <a href="#" data-sec="producciones">Producciones</a>
</div>

<div class="menu-btn" onclick="openMenu()">☰</div>

<!-- CONTENIDO -->
<div id="app">

<!-- INICIO -->
<div class="section active" id="inicio">
  <h2>Nuevo Programa</h2>
  <div class="carousel" id="c1"></div>

  <div class="contacto">
    📧 bucklemusicpodcast@gmail.com
    <span>Usa el menú para navegar</span>
  </div>
</div>

<div class="section" id="nuevo">
  <h2>Nuevo Programa</h2>
  <div class="carousel" id="c2"></div>
</div>

<div class="section" id="programas">
  <h2>Programas Buckle</h2>
  <div class="carousel" id="c3"></div>
</div>

<div class="section" id="mix">
  <h2>In The Mix</h2>
  <div class="carousel" id="c4"></div>
</div>

<div class="section" id="reserva">
  <h2>Gran Reserva</h2>
  <div class="carousel" id="c5"></div>
</div>

<div class="section" id="producciones">
  <h2>Producciones</h2>
  <div class="carousel" id="c6"></div>
</div>

</div>

<script>
// MENU
const sidebar=document.getElementById("sidebar");
const overlay=document.getElementById("overlay");

function openMenu(){
  sidebar.style.left="0";
  overlay.style.display="block";
}
function closeMenu(){
  sidebar.style.left="-260px";
  overlay.style.display="none";
}

// CAMBIO SECCIONES
const sections=document.querySelectorAll(".section");
document.querySelectorAll(".sidebar a").forEach(link=>{
  link.onclick=(e)=>{
    e.preventDefault();
    const id=link.dataset.sec;
    sections.forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    closeMenu();
  }
});

// SPLASH
setTimeout(()=>{
  document.getElementById("splash").style.display="none";
},1200);

// FETCH
const map=["nuevo","nuevo","programas","mix","reserva","producciones"];

map.forEach((sec,i)=>{
  const c=document.getElementById("c"+(i+1));

  fetch(`https://archive.org/advancedsearch.php?q=creator:buckle_music AND mediatype:audio&fl[]=identifier,section&rows=50&output=json`)
  .then(r=>r.json())
  .then(data=>{
    data.response.docs.forEach(item=>{
      if(item.section?.toLowerCase()===sec){

        const num=item.identifier.match(/\d+/g)?.pop()||"";
        const card=document.createElement("div");
        card.className="card";

        const img=document.createElement("img");
        img.src=`https://archive.org/services/img/${item.identifier}`;
        img.onclick=()=>window.location.href=`player.html?id=${item.identifier}`;

        const n=document.createElement("div");
        n.className="numero";
        n.innerText=num;

        card.appendChild(img);
        card.appendChild(n);
        c.appendChild(card);
      }
    });
  });
});
</script>

</body>
</html>
