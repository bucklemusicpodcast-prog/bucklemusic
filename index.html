<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Buckle Music</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="logo-512.png">

<style>

body{
margin:0;
font-family:Arial;
color:white;
background: linear-gradient(270deg,#000,#001f1f,#000,#002a2a);
background-size:400% 400%;
animation:fondo 10s ease infinite;
}

@keyframes fondo{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

header{
text-align:center;
padding:40px 20px;
}

header img{
width:120px;
}

h1{
color:#00ffe0;
margin:10px 0;
}

.section{
max-width:900px;
margin:40px auto;
padding:0 20px;
}

.program{
display:flex;
align-items:center;
gap:15px;
background:#111;
padding:12px;
border-radius:10px;
margin-bottom:12px;
cursor:pointer;
}

.program img{
width:70px;
border-radius:6px;
}

.program-title{
font-size:16px;
}

.player-bar{

position:fixed;
bottom:0;
left:0;
width:100%;
background:#000;
padding:15px;

}

.player-bar audio{
width:100%;
}

</style>

</head>

<body>

<header>

<img src="logo-512.png">

<h1>BUCKLE MUSIC</h1>

<p>Podcast de música electrónica</p>

</header>

<div class="section">

<h2>🎧 Programas</h2>

<div id="programs"></div>

</div>

<div class="player-bar">

<audio id="player" controls></audio>

</div>

<script>

const container=document.getElementById("programs")

fetch("https://archive.org/advancedsearch.php?q=collection:buckle-2-temporada-3.0&output=json")

.then(r=>r.json())

.then(data=>{

data.response.docs.forEach(item=>{

const id=item.identifier

const title=item.title

const mp3="https://archive.org/download/"+id+"/"+id+".mp3"

const cover="https://archive.org/services/img/"+id

const div=document.createElement("div")

div.className="program"

div.innerHTML=`

<img src="${cover}">
<div class="program-title">${title}</div>

`

div.onclick=()=>{

document.getElementById("player").src=mp3
document.getElementById("player").play()

}

container.appendChild(div)

})

})

</script>

</body>

</html>
