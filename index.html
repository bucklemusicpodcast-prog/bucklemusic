<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buckle Music PRO</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="logo-512.png">

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  color:white;
  background: linear-gradient(270deg,#000,#001f1f,#000,#002a2a);
  background-size:400% 400%;
  animation:fondo 8s ease infinite;
}
@keyframes fondo{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}
header{text-align:center;padding:40px 20px;}
header img{width:120px;margin-bottom:10px;}
h1{color:#00ffe0;font-size:42px;margin:0;}
.tagline{color:#aaa;}
.section{max-width:900px;margin:30px auto;padding:0 20px;}
.episode-card{
  background:#111;padding:15px;margin-bottom:20px;border-radius:12px;
  display:flex;flex-direction:column;align-items:center;gap:15px;
}
.episode-card img{width:120px;height:120px;object-fit:cover;border-radius:8px;}
.episode-card h3{margin:0;font-size:20px;text-align:center;}
.episode-card audio,.episode-card iframe{width:100%;margin-top:5px;}
button{background:#00ffe0;border:none;padding:15px 25px;font-size:18px;border-radius:10px;cursor:pointer;}
button:hover{background:#00cfc0;}
</style>
</head>
<body>

<header>
<img src="logo-512.png" alt="Buckle Music Logo">
<h1>BUCKLE MUSIC</h1>
<p class="tagline">120 minutos de música electrónica cada semana</p>
</header>

<!-- Programa de la semana -->
<div class="section">
<h2>🎧 Programa de la semana</h2>
<div class="episode-card">
  <img src="https://archive.org/download/bucklemusic2026/programa20.jpg" alt="Programa 20">
  <h3>Programa 20 - Semana actual</h3>
  <audio controls src="https://archive.org/download/bucklemusic2026/programa20.mp3"></audio>
</div>
</div>

<!-- Otros programas (iVoox) -->
<div class="section">
<h2>📻 Otros programas</h2>
<div class="episode-card">
  <iframe src="https://www.ivoox.com/player_es_podcast_2535828_zp_1.html?c1=20cbda" height="200" frameborder="0" allowfullscreen scrolling="no"></iframe>
</div>
<div class="episode-card">
  <iframe src="https://www.ivoox.com/player_es_podcast_2535828_zp_2.html?c1=20cbda" height="200" frameborder="0" allowfullscreen scrolling="no"></iframe>
</div>
<!-- Repetir según cantidad de programas -->
</div>

<!-- Emisión en directo -->
<div class="section">
<h2>🔴 En vivo</h2>
<div class="episode-card">
  <iframe width="100%" height="315" src="https://www.youtube.com/embed/live_stream?channel=TU_CANAL_ID" frameborder="0" allowfullscreen></iframe>
</div>
<div class="episode-card">
  <iframe src="https://player.twitch.tv/?channel=TU_CANAL&parent=TU_DOMINIO" height="315" width="100%" allowfullscreen></iframe>
</div>
</div>

<script>
// Registrar Service Worker para PWA
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/service-worker.js')
    .then(reg=>console.log('Service Worker registrado', reg))
    .catch(err=>console.error('Service Worker error:', err));
}
</script>

</body>
</html>
