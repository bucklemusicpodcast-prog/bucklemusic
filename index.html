<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buckle Music</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Orbitron', sans-serif;
color:white;
background:url("fondo.jpg") center/cover fixed;
scroll-behavior:smooth;
}

/* OSCURECER FONDO */
body::before{
content:"";
position:fixed;
top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.5);
z-index:0;
}

/* SPLASH */
#splash{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}
#splash img{width:120px;}

/* HEADER */
header{
text-align:center;
padding:15px;
position:relative;
z-index:1;
}
header img{width:70px;}
h1{color:#00ffe0;margin:5px;}
header p{color:#00ffe0;font-size:14px;}

/* REDES */
.social{
display:flex;
justify-content:center;
gap:15px;
margin:10px;
position:relative;
z-index:1;
}
.social img{
width:30px;
cursor:pointer;
transition:0.3s;
}
.social img:hover{transform:scale(1.2);}

/* MENU */
.menu-btn{
position:fixed;
top:15px;
left:15px;
font-size:28px;
cursor:pointer;
z-index:1000;
}

/* OVERLAY MENU */
.overlay-menu{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
z-index:998;
}

/* SIDEBAR */
.sidebar{
position:fixed;
top:0;
left:-250px;
width:250px;
height:100%;
background:rgba(0,0,0,0.9);
padding:20px;
transition:0.3s;
z-index:999;
}

.sidebar a{
display:block;
color:white;
padding:12px;
text-decoration:none;
border-bottom:1px solid #333;
}
.sidebar a:hover{
background:#00ffe0;
color:black;
}

/* CARRUSEL */
.carousel{
display:flex;
overflow-x:auto;
gap:15px;
padding:20px;
position:relative;
z-index:1;
}

/* CARD */
.card{
position:relative;
flex-shrink:0;
}

.card img{
width:130px;
border-radius:10px;
cursor:pointer;
}

/* NUMERO */
.numero{
position:absolute;
top:5px;
left:5px;
background:rgba(0,0,0,0.7);
color:#00ffe0;
font-size:14px;
padding:3px 8px;
border-radius:5px;
font-weight:bold;
}

/* PLAYER */
.player-modal{
position:fixed;
top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.95);
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:9999;
}
.player-modal img{width:250px;margin-bottom:20px;}
.player-modal iframe{width:90%;height:80px;border:none;}
.close{position:absolute;top:20px;right:20px;font-size:25px;cursor:pointer;}

h2{
color:#00ffe0;
padding-left:20px;
position:relative;
z-index:1;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
<img src="logo-512.png">
</div>

<!-- MENU -->
<div class="menu-btn" onclick="openMenu()">☰</div>
<div class="overlay-menu" id="overlay" onclick="closeMenu()"></div>

<div class="sidebar" id="sidebar">
<a onclick="goTo('top')">Inicio</a>
<a onclick="goTo('nuevo')">Nuevo Programa</a>
<a onclick="goTo('programas')">Programas Buckle</a>
<a onclick="goTo('mix')">In The Mix</a>
<a onclick="goTo('reserva')">Gran Reserva</a>
<a onclick="goTo('pro')">Producciones</a>
</div>

<header id="top">
<img src="logo-512.png">
<h1>Buckle Music</h1>
<p>bucklemusicpodcast@gmail.com</p>
</header>

<!-- REDES -->
<div class="social">
<a href="https://www.youtube.com/@BUKLEEMUSIC/streams" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
</a>
<a href="https://www.instagram.com/bucklemusic" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/1384/1384063.png">
</a>
<a href="https://www.facebook.com" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/1384/1384053.png">
</a>
<a href="https://go.ivoox.com/sq/2535828" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968389.png">
</a>
</div>

<h2 id="nuevo">Nuevo Programa</h2>
<div class="carousel" id="c1"></div>

<h2 id="programas">Programas Buckle</h2>
<div class="carousel" id="c2"></div>

<h2 id="mix">In The Mix</h2>
<div class="carousel" id="c3"></div>

<h2 id="reserva">Gran Reserva</h2>
<div class="carousel" id="c4"></div>

<h2 id="pro">Producciones</h2>
<div class="carousel" id="c5"></div>

<!-- PLAYER -->
<div class="player-modal" id="modal">
<span class="close" onclick="cerrar()">✖</span>
<img id="cover">
<iframe id="frame"></iframe>
</div>

<script>

/* SPLASH */
setTimeout(()=>{splash.style.display="none";},2000);

/* MENU */
function openMenu(){
sidebar.style.left="0";
overlay.style.display="block";
}
function closeMenu(){
sidebar.style.left="-250px";
overlay.style.display="none";
}

/* SCROLL */
function goTo(id){
document.getElementById(id).scrollIntoView();
closeMenu();
}

/* PLAYER */
function play(id){
modal.style.display="flex";
cover.src=`https://archive.org/services/img/${id}`;
frame.src=`https://archive.org/embed/${id}`;
}
function cerrar(){
modal.style.display="none";
frame.src="";
}

/* FETCH + ORDENAR */
fetch(`https://archive.org/advancedsearch.php?q=creator:buckle_music AND mediatype:audio&fl[]=identifier,section&rows=50&output=json`)
.then(r=>r.json())
.then(data=>{

// 🔥 ORDENAR POR NUMERO
data.response.docs.sort((a,b)=>{
const getNum = str => {
const match = str.match(/\d+/g);
return match ? parseInt(match[match.length-1]) : 0;
};
return getNum(b.identifier) - getNum(a.identifier);
});

data.response.docs.forEach(item=>{

const match = item.identifier.match(/\d+/g);
const numero = match ? match[match.length-1] : "";

// CARD
const card=document.createElement("div");
card.className="card";

// IMG
const img=document.createElement("img");
img.src=`https://archive.org/services/img/${item.identifier}`;
img.onclick=()=>play(item.identifier);

// NUMERO
const num=document.createElement("div");
num.className="numero";
num.innerText=numero;

// MONTAR
card.appendChild(img);
card.appendChild(num);

const s=item.section;

if(s==="nuevo") c1.appendChild(card);
else if(s==="programas") c2.appendChild(card);
else if(s==="mix") c3.appendChild(card);
else if(s==="reserva") c4.appendChild(card);
else if(s==="producciones") c5.appendChild(card);

});

});
</script>

</body>
</html>
