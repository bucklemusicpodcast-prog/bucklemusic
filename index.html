<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buckle Music</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Orbitron', sans-serif;
color:white;
background:url("fondo.jpg") center/cover fixed;
}

/* SPLASH */
#splash{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

#splash img{
width:120px;
animation:zoom 2s ease;
}

@keyframes zoom{
0%{transform:scale(0.5);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

/* OVERLAY FONDO */
body::before{
content:"";
position:fixed;
top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.5);
z-index:0;
}

/* HEADER */
header{
text-align:center;
padding:15px;
position:relative;
z-index:1;
}

header img{width:70px;}
h1{color:#00ffe0;margin:5px;}
header p{color:#00ffe0;font-size:14px;}

/* MENU HAMBURGUESA */
.menu-btn{
position:fixed;
top:15px;
left:15px;
font-size:28px;
cursor:pointer;
z-index:1000;
}

/* SIDEBAR */
.sidebar{
position:fixed;
top:0;
left:-250px;
width:250px;
height:100%;
background:#000;
padding:20px;
transition:0.3s;
z-index:999;
}

.sidebar a{
display:block;
color:white;
padding:10px;
text-decoration:none;
border-bottom:1px solid #222;
}

.sidebar a:hover{
background:#00ffe0;
color:black;
}

/* CARRUSEL */
.carousel{
display:flex;
overflow-x:auto;
gap:15px;
padding:20px;
position:relative;
z-index:1;
}

.carousel img{
width:130px;
border-radius:10px;
cursor:pointer;
}

/* PLAYER */
.player-modal{
position:fixed;
top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.95);
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:9999;
}

.player-modal img{width:250px;margin-bottom:20px;}
.player-modal iframe{width:90%;height:80px;border:none;}
.close{position:absolute;top:20px;right:20px;font-size:25px;cursor:pointer;}

h2{color:#00ffe0;padding-left:20px;position:relative;z-index:1;}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
<img src="logo-512.png">
</div>

<!-- MENU -->
<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div class="sidebar" id="sidebar">
<a href="#">Inicio</a>
<a href="#nuevo">Nuevo Programa</a>
<a href="#programas">Programas Buckle</a>
<a href="#mix">In The Mix</a>
<a href="#reserva">Gran Reserva</a>
<a href="#pro">Producciones</a>
</div>

<header>
<img src="logo-512.png">
<h1>Buckle Music</h1>
<p>bucklemusicpodcast@gmail.com</p>
</header>

<h2 id="nuevo">Nuevo Programa</h2>
<div class="carousel" id="c1"></div>

<h2 id="programas">Programas Buckle</h2>
<div class="carousel" id="c2"></div>

<h2 id="mix">In The Mix</h2>
<div class="carousel" id="c3"></div>

<h2 id="reserva">Gran Reserva</h2>
<div class="carousel" id="c4"></div>

<h2 id="pro">Producciones</h2>
<div class="carousel" id="c5"></div>

<!-- PLAYER -->
<div class="player-modal" id="modal">
<span class="close" onclick="cerrar()">✖</span>
<img id="cover">
<iframe id="frame"></iframe>
</div>

<script>

/* SPLASH */
setTimeout(()=>{
document.getElementById("splash").style.display="none";
},2500);

/* MENU */
function toggleMenu(){
const menu=document.getElementById("sidebar");
menu.style.left = menu.style.left==="0px" ? "-250px" : "0px";
}

/* PLAYER */
function play(id){
modal.style.display="flex";
cover.src=`https://archive.org/services/img/${id}`;
frame.src=`https://archive.org/embed/${id}`;
}

function cerrar(){
modal.style.display="none";
frame.src="";
}

/* FETCH */
fetch(`https://archive.org/advancedsearch.php?q=creator:buckle_music AND mediatype:audio&fl[]=identifier,section&sort[]=publicdate desc&rows=50&output=json`)
.then(r=>r.json())
.then(data=>{
data.response.docs.forEach(item=>{
const img=document.createElement("img");
img.src=`https://archive.org/services/img/${item.identifier}`;
img.onclick=()=>play(item.identifier);

const s=item.section;

if(s==="nuevo") c1.appendChild(img);
else if(s==="programas") c2.appendChild(img);
else if(s==="mix") c3.appendChild(img);
else if(s==="reserva") c4.appendChild(img);
else if(s==="producciones") c5.appendChild(img);
});
});

</script>

</body>
</html>
