<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buckle Music - Netflix Style</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Orbitron', sans-serif;
  color:white;
  position:relative;
  background:url("fondo.jpg") center/cover fixed;
}

/* Overlay oscuro para destacar letras y carátulas */
body::before{
  content:"";
  position:fixed;
  top:0; left:0; right:0; bottom:0;
  background:rgba(0,0,0,0.5); /* 50% oscuro */
  z-index:0;
}

header{text-align:center;padding:15px;position:relative;z-index:1;}
header img{width:70px;}
h1{color:#00ffe0;font-size:26px;margin:5px;text-align:center;}
header p{color:#00ffe0;font-size:14px;margin:3px;}

.social{
  display:flex;
  justify-content:center;
  gap:15px;
  margin:10px;
  position:relative; z-index:1;
}

.social img{
  width:35px;height:35px;
  transition:0.3s;
  cursor:pointer;
}

.social img:hover{
  transform:scale(1.2);
  filter:drop-shadow(0 0 8px #00ffe0);
}

.live{
  text-align:center;
  margin:10px;
  position:relative; z-index:1;
}

.live a{
  background:red;
  color:white;
  padding:8px 15px;
  border-radius:20px;
  text-decoration:none;
  font-size:14px;
  box-shadow:0 0 10px red;
}

h2{
  color:#00ffe0;
  padding-left:20px;
  margin-top:30px;
  position:relative; z-index:1;
}

/* CARRUSEL TIPO NETFLIX */
.carousel{
  display:flex;
  overflow-x:auto;
  gap:15px;
  padding:20px;
  scroll-behavior:smooth;
  position:relative; z-index:1;
}

.carousel::-webkit-scrollbar{
  height:8px;
}
.carousel::-webkit-scrollbar-thumb{
  background:#00ffe0;
  border-radius:4px;
}

.carousel img{
  width:130px;
  border-radius:10px;
  cursor:pointer;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  flex-shrink:0;
}

.carousel img.active{
  transform:scale(1.6);
  z-index:2;
  box-shadow:0 0 15px #00ffe0;
}

/* PLAYER MODAL */
.player-modal{
  position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:999;
}
.player-modal img{width:250px;border-radius:15px;margin-bottom:20px;}
.player-modal iframe{width:90%;height:80px;border:none;}
.close{position:absolute;top:20px;right:20px;font-size:25px;cursor:pointer;}
</style>
</head>
<body>

<header>
  <img src="logo-512.png" alt="Buckle Music Logo">
  <h1>Buckle Music</h1>
  <p>bucklemusicpodcast@gmail.com</p>
</header>

<div class="social">
  <a href="https://www.youtube.com/@BUKLEEMUSIC/streams" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" alt="YouTube">
  </a>
  <a href="https://www.instagram.com/bucklemusic" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/1384/1384063.png" alt="Instagram">
  </a>
  <a href="https://www.facebook.com" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/1384/1384053.png" alt="Facebook">
  </a>
  <a href="https://archive.org/download/ivoox-logo/ivoox-logo.png" target="_blank">
    <img src="https://archive.org/download/ivoox-logo/ivoox-logo.png" alt="iVoox" style="width:35px;height:35px;">
  </a>
</div>

<div class="live">
  <a href="https://www.youtube.com/@BUKLEEMUSIC/streams" target="_blank">🔴 EN DIRECTO</a>
</div>

<h2>Nuevo Programa</h2><div class="carousel" id="nuevo"></div>
<h2>Programas Buckle Music</h2><div class="carousel" id="programas"></div>
<h2>In The Mix</h2><div class="carousel" id="mix"></div>
<h2>Gran Reserva</h2><div class="carousel" id="reserva"></div>
<h2>Producciones Buckle Music</h2><div class="carousel" id="pro"></div>

<div class="player-modal" id="modal">
  <span class="close" onclick="cerrar()">✖</span>
  <img id="cover">
  <iframe id="frame"></iframe>
</div>

<script>
if("Notification" in window){Notification.requestPermission();}
function notificar(id){
  if(Notification.permission==="granted"){
    new Notification("Nuevo episodio disponible 🎧",{body:"Ya puedes escucharlo",icon:`https://archive.org/services/img/${id}`});
  }
}
function play(id){
  document.getElementById("modal").style.display="flex";
  document.getElementById("cover").src=`https://archive.org/services/img/${id}`;
  document.getElementById("frame").src=`https://archive.org/embed/${id}`;
}
function cerrar(){
  document.getElementById("modal").style.display="none";
  document.getElementById("frame").src="";
}

function setActiveCarousel(carousel){
  const imgs = carousel.querySelectorAll("img");
  imgs.forEach(i=>i.classList.remove("active"));
  imgs[0]?.classList.add("active");
  imgs.forEach(img=>{
    img.addEventListener("click",()=>{imgs.forEach(x=>x.classList.remove("active")); img.classList.add("active");});
  });
}

// FETCH y ordenar de mayor a menor según número al final del identifier
fetch(`https://archive.org/advancedsearch.php?q=creator:buckle_music AND mediatype:audio&fl[]=identifier,title,section&sort[]=publicdate desc&rows=50&output=json`)
.then(r=>r.json())
.then(data=>{
  const sections = {
    "nuevo":document.getElementById("nuevo"),
    "programas":document.getElementById("programas"),
    "mix":document.getElementById("mix"),
    "reserva":document.getElementById("reserva"),
    "producciones":document.getElementById("pro")
  };

  data.response.docs.sort((a,b)=>{
    const numA = parseInt(a.identifier.match(/\d+$/)||[0]);
    const numB = parseInt(b.identifier.match(/\d+$/)||[0]);
    return numB - numA;
  });

  data.response.docs.forEach(item=>{
    const img=document.createElement("img");
    img.src=`https://archive.org/services/img/${item.identifier}`;
    img.onclick=()=>play(item.identifier);

    const section = item.section ? item.section.toLowerCase() : "";
    if(section && sections[section]){
      sections[section].appendChild(img);
      if(section==="nuevo") notificar(item.identifier);
    }
  });

  Object.values(sections).forEach(setActiveCarousel);
});
</script>

</body>
</html>
