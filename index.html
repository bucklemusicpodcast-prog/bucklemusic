<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buckle Music PRO</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="logo-512.png">

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  color:white;
  background: linear-gradient(270deg,#000,#001f1f,#000,#002a2a);
  background-size:400% 400%;
  animation:fondo 8s ease infinite;
}
@keyframes fondo{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}
header{text-align:center;padding:40px 20px;}
header img{width:120px;margin-bottom:10px;}
h1{color:#00ffe0;font-size:42px;margin:0;}
.tagline{color:#aaa;}
.section{max-width:900px;margin:30px auto;padding:0 20px;}
.episode-card{
  background:#111;padding:15px;margin-bottom:20px;border-radius:12px;
  display:flex;flex-direction:column;align-items:center;gap:15px;
}
.episode-card img{width:120px;height:120px;object-fit:cover;border-radius:8px;}
.episode-card h3{margin:0;font-size:20px;text-align:center;}
.episode-card audio{width:100%;margin-top:5px;}
</style>
</head>
<body>

<header>
<img src="logo-512.png" alt="Buckle Music Logo">
<h1>BUCKLE MUSIC</h1>
<p class="tagline">120 minutos de música electrónica cada semana</p>
</header>

<!-- Programa de la semana -->
<div class="section">
<h2>🎧 Programa de la semana</h2>
<div class="episode-card" id="weekly-program">
  <!-- Se llenará automáticamente -->
</div>
</div>

<!-- Todos los programas -->
<div class="section">
<h2>📻 Todos los programas</h2>
<div id="episodes"></div>
</div>

<script>
// URL base de tu colección en Archive.org
const baseURL = "https://archive.org/download/buckle-2-temporada-3.0/";

// Cargar archivos XML y generar programas automáticamente
fetch(baseURL + "files.xml")
  .then(r => r.text())
  .then(str => new window.DOMParser().parseFromString(str,"text/xml"))
  .then(data => {
    const files = Array.from(data.querySelectorAll("file"));
    const mp3Files = files.filter(f => f.getAttribute("name").endsWith(".mp3"));

    // Ordenar para que el último sea el programa de la semana
    mp3Files.sort((a,b)=>a.getAttribute("name").localeCompare(b.getAttribute("name")));

    const containerAll = document.getElementById("episodes");
    const weeklyContainer = document.getElementById("weekly-program");

    mp3Files.forEach((f, index)=>{
      const name = f.getAttribute("name").replace(".mp3","");
      const audioURL = baseURL + name + ".mp3";
      const coverURL = baseURL + name + ".jpg";

      const div = document.createElement("div");
      div.classList.add("episode-card");
      div.innerHTML = `
        <img src="${coverURL}" alt="${name}">
        <h3>${name}</h3>
        <audio controls src="${audioURL}"></audio>
      `;

      if(index === mp3Files.length - 1){
        // Último episodio -> Programa de la semana
        weeklyContainer.appendChild(div);
      } else {
        containerAll.appendChild(div);
      }
    });
  })
  .catch(err=>console.error("Error cargando episodios:", err));

// Registrar Service Worker para PWA
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/service-worker.js')
    .then(reg => console.log('Service Worker registrado', reg))
    .catch(err => console.error('Service Worker error:', err));
}
</script>

</body>
</html>
