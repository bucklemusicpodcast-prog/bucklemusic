<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buckle Music PRO</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="logo.png">

<style>
/* Fondo animado tipo discoteca */
body{
  margin:0;
  font-family:Arial, sans-serif;
  color:white;
  background: linear-gradient(270deg,#000,#001f1f,#000,#002a2a);
  background-size:400% 400%;
  animation:fondo 8s ease infinite;
}
@keyframes fondo{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* Cabecera */
header{
  text-align:center;
  padding:40px 20px;
}
header img{
  width:120px;
  margin-bottom:10px;
}
h1{
  color:#00ffe0;
  font-size:42px;
  margin:0;
}
.tagline{
  color:#aaa;
}

/* Secciones */
.section{
  max-width:900px;
  margin:30px auto;
  padding:0 20px;
}
.card{
  background:#111;
  padding:15px;
  margin-bottom:20px;
  border-radius:12px;
}
.card h3{
  margin:0 0 10px 0;
}

/* Ivoox iframe */
iframe{
  width:100%;
  border-radius:12px;
  margin-top:15px;
}

/* Reproductor flotante */
.player-fixed{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#111;
  padding:15px 20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  z-index:999;
  border-top:2px solid #00ffe0;
  border-radius:15px 15px 0 0;
}
.player-fixed h2{
  margin:0 0 10px 0;
  font-size:18px;
}
.player-fixed audio{
  width:90%;
  border-radius:8px;
}
</style>
</head>
<body>

<header>
<img src="logo.png">
<h1>BUCKLE MUSIC</h1>
<p class="tagline">120 minutos de música electrónica cada semana</p>
</header>

<div class="section" id="episodes">
<h2>🔥 Programas recientes</h2>
<!-- Episodios automáticos se cargarán aquí -->
</div>

<div class="section">
<h2>📡 Escucha el podcast en iVoox</h2>
<iframe src="https://www.ivoox.com/player_es_podcast_2535828_zp_1.html?c1=20cbda" 
height="400" scrolling="no" allowfullscreen loading="lazy"></iframe>
</div>

<!-- Reproductor flotante -->
<div class="player-fixed">
<h2>🎧 Último programa</h2>
<audio controls>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>
</div>

<script>
// RSS iVoox automático (últimos 5 episodios)
const feedUrl = "https://www.ivoox.com/podcast-buckle-music_sq_f12535828_1.xml";
fetch(feedUrl)
.then(r=>r.text())
.then(str=>new window.DOMParser().parseFromString(str,"text/xml"))
.then(data=>{
  const items = data.querySelectorAll("item");
  const container = document.getElementById("episodes");
  items.forEach((item,i)=>{
    if(i>=5) return;
    const title = item.querySelector("title").textContent;
    const mp3 = item.querySelector("enclosure").getAttribute("url");
    const div = document.createElement("div");
    div.classList.add("card");
    div.innerHTML = `<h3>${title}</h3><audio controls src="${mp3}"></audio>`;
    container.appendChild(div);
  });
});

// Service Worker (para instalar como app)
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/service-worker.js')
    .then(reg=>console.log('Service Worker registrado', reg));
}
</script>

</body>
</html>
