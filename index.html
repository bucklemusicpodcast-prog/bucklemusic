<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buckle Music</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="logo-512.png">

<style>

body{
margin:0;
font-family:'Orbitron', sans-serif;
color:white;
background-image:url("fondo.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
z-index:-1;
}

header{
text-align:center;
padding:20px;
}

header img{
width:70px;
}

h1{
color:#00ffe0;
margin:5px;
font-size:26px;
}

.section{
max-width:1100px;
margin:auto;
padding:20px;
}

h2{
color:#00ffe0;
margin-bottom:15px;
letter-spacing:2px;
}

.social{
display:flex;
justify-content:center;
gap:20px;
margin-top:10px;
}

.social img{
width:35px;
cursor:pointer;
transition:0.3s;
}

.social img:hover{
transform:scale(1.25);
filter:drop-shadow(0 0 8px #00ffe0);
}

.mail{
text-align:center;
margin-top:10px;
font-size:14px;
}

.carousel{
display:flex;
overflow-x:auto;
gap:20px;
padding:10px;
scroll-behavior:smooth;
}

.carousel img{
width:150px;
border-radius:10px;
cursor:pointer;
transition:0.4s;
}

.carousel img:hover{
transform:scale(1.2) rotateY(10deg);
box-shadow:0 0 15px #00ffe0;
}

.player-fixed{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#000;
padding:8px;
display:none;
z-index:999;
}

.player-fixed iframe{
width:100%;
height:60px;
border:none;
}

</style>
</head>

<body>

<div class="overlay"></div>

<header>

<img src="logo-512.png">

<h1>Buckle Music</h1>

</header>

<!-- REDES SOCIALES -->

<div class="social">

<a href="https://www.youtube.com/@BUKLEEMUSIC/streams" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
</a>

<a href="https://www.instagram.com/bucklemusic?igsh=MWx3cXVrMDdqeWkxdA%3D%3D&utm_source=qr" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/1384/1384063.png">
</a>

<a href="https://www.facebook.com/share/1BNzzDwta8/?mibextid=wwXIfr" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/1384/1384053.png">
</a>

<a href="https://go.ivoox.com/sq/2535828" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/1384/1384061.png">
</a>

</div>

<div class="mail">

bucklemusicpodcast@gmail.com

</div>

<!-- NUEVO EPISODIO -->

<div class="section">

<h2>Nuevo Episodio</h2>

<div class="carousel">

<img src="https://archive.org/services/img/buckle-20-music-2026"
onclick="playEpisode('buckle-20-music-2026')">

</div>

</div>

<!-- PROGRAMAS -->

<div class="section">

<h2>Programas Buckle Music</h2>

<div class="carousel" id="episodes">

<img src="https://archive.org/services/img/buckle-19-temporada-3.0"
onclick="playEpisode('buckle-19-temporada-3.0')">

</div>

</div>

<!-- IN THE MIX -->

<div class="section">

<h2>In The Mix</h2>

<div class="carousel">

<img src="https://archive.org/services/img/sesion-marzo-buckle-music-25"
onclick="playEpisode('sesion-marzo-buckle-music-25')">

</div>

</div>

<!-- GRAN RESERVA -->

<div class="section">

<h2>Gran Reserva</h2>

<div class="carousel">

<img src="https://archive.org/services/img/buckle-5-music-2026"
onclick="playEpisode('buckle-5-music-2026')">

<img src="https://archive.org/services/img/buckle-3-music-2026"
onclick="playEpisode('buckle-3-music-2026')">

</div>

</div>

<!-- REPRODUCTOR -->

<div class="player-fixed" id="player">

<iframe id="playerframe"></iframe>

</div>

<script>

const collection = "buckle-2-temporada-3.0";

const container = document.getElementById("episodes");

fetch(`https://archive.org/advancedsearch.php?q=collection:${collection}&fl[]=identifier,title&sort[]=publicdate+desc&rows=50&page=1&output=json`)

.then(r => r.json())

.then(data => {

data.response.docs.forEach(item => {

const img = document.createElement("img");

img.src = `https://archive.org/services/img/${item.identifier}`;

img.onclick = () => playEpisode(item.identifier);

container.appendChild(img);

});

});

function playEpisode(id){

const player = document.getElementById("player");

const frame = document.getElementById("playerframe");

frame.src = `https://archive.org/embed/${id}`;

player.style.display="block";

window.scrollTo(0,document.body.scrollHeight);

}

</script>

</body>
</html>
