<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buckle Music</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Orbitron', sans-serif;
  color:white;
  background:url("fondo.jpg") center/cover fixed;
  scroll-behavior:smooth;
}

/* SPLASH */
#splash{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
  opacity:1;
  transition:opacity 1s;
}
#splash img{
  width:120px;
  margin-bottom:20px;
  animation: splashLogo 1s forwards;
}
#splash span{
  font-size:28px;
  color:#00ffe0;
  font-family:'Orbitron', sans-serif;
  opacity:0;
  animation: splashText 1s forwards 0.5s;
}
@keyframes splashLogo{ to { transform: translateY(0); } }
@keyframes splashText{ to { opacity:1; } }

/* SIDEBAR */
.sidebar{
  position:fixed;
  top:0;
  left:-260px; /* cerrado al inicio */
  width:260px;
  height:100%;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(15px);
  padding:20px;
  transition:0.4s;
  z-index:999;
  box-shadow:5px 0 20px rgba(0,0,0,0.3);
}
.sidebar a{
  display:block;
  color:white;
  padding:14px;
  text-decoration:none;
  border-radius:8px;
  margin-bottom:8px;
}
.sidebar a:hover{background:#00ffe0;color:black;}
.overlay-menu{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  z-index:998;
}
.menu-btn{
  font-size:26px;
  cursor:pointer;
  position:fixed;
  top:15px;
  left:15px;
  z-index:1000;
}

/* REDES */
.social{
  display:flex;
  justify-content:flex-start; 
  gap:15px;
  position:fixed;
  top:80px;
  z-index:100;
  padding-left:320px; /* margen con sidebar */
}
.social img{
  width:28px;
  transition:0.3s;
}
.social img:hover{transform:scale(1.2);}

/* SECCIONES */
.section{
  padding:50px 20px 30px 20px; /* más compacto verticalmente */
  position:relative;
  text-align:center;
}
h2{
  color:#00ffe0;
  margin-bottom:20px;
  font-size:32px;
  text-shadow: 2px 2px 10px #000;
  display:block;
}

/* CARRUSEL */
.carousel{
  display:flex;
  justify-content:center; /* centrado */
  overflow-x:auto;
  gap:15px;
  padding:0 0 30px 0;
}
.card{
  position:relative;
  flex-shrink:0;
}
.card img{
  width:130px;
  border-radius:12px;
  cursor:pointer;
  transition:0.3s;
}
.card img:hover{transform:scale(1.05);}
.numero{
  position:absolute;
  top:6px;
  left:6px;
  background:rgba(0,0,0,0.8);
  color:#00ffe0;
  font-size:13px;
  padding:3px 7px;
  border-radius:6px;
  font-weight:bold;
}

/* PLAYER */
.player-modal{
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.95);
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:9999;
}
.player-modal img{width:260px;margin-bottom:20px;border-radius:12px;}
.player-modal iframe{width:90%;height:80px;border:none;}
.close{position:absolute;top:20px;right:20px;font-size:25px;cursor:pointer;}

@media(max-width:600px){
  h2{font-size:24px;}
  .card img{width:100px;}
  .social{padding-left:20px;}
}
</style>
</head>
<body>

<!-- SPLASH INICIO -->
<div id="splash">
  <img src="logo-512.png">
  <span>Buckle Music</span>
</div>

<!-- MENU -->
<div class="overlay-menu" id="overlay" onclick="closeMenu()"></div>
<div class="sidebar" id="sidebar">
  <a onclick="goTo('inicio')">Inicio</a>
  <a onclick="goTo('nuevo')">Nuevo Programa</a>
  <a onclick="goTo('programas')">Programas Buckle</a>
  <a onclick="goTo('mix')">In The Mix</a>
  <a onclick="goTo('reserva')">Gran Reserva</a>
  <a onclick="goTo('pro')">Producciones</a>
  <a onclick="goTo('contacto')">Contacto</a>
</div>
<div class="menu-btn" onclick="openMenu()">☰</div>

<!-- REDES SOCIALES (ocultas en inicio) -->
<div class="social" id="socials">
  <a href="https://www.youtube.com/@BUKLEEMUSIC/streams" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png"></a>
  <a href="https://www.instagram.com/bucklemusic" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384063.png"></a>
  <a href="https://www.facebook.com" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384053.png"></a>
  <a href="https://go.ivoox.com/sq/2535828" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/5968/5968389.png"></a>
</div>

<!-- SECCIONES -->
<div class="section" id="inicio">
  <img src="logo-512.png" style="width:150px;margin-bottom:20px;">
  <h2>Buckle Music</h2>
</div>

<div class="section" id="nuevo">
  <h2>Nuevo Programa</h2>
  <div class="carousel" id="c1"></div>
</div>

<div class="section" id="programas">
  <h2>Programas Buckle</h2>
  <div class="carousel" id="c2"></div>
</div>

<div class="section" id="mix">
  <h2>In The Mix</h2>
  <div class="carousel" id="c3"></div>
</div>

<div class="section" id="reserva">
  <h2>Gran Reserva</h2>
  <div class="carousel" id="c4"></div>
</div>

<div class="section" id="pro">
  <h2>Producciones</h2>
  <div class="carousel" id="c5"></div>
</div>

<div class="section" id="contacto">
  <h2>Contacto</h2>
  <p style="color:#00ffe0; font-size:18px;">📧 bucklemusicpodcast@gmail.com</p>
</div>

<!-- PLAYER -->
<div class="player-modal" id="modal">
  <span class="close" onclick="cerrar()">✖</span>
  <img id="cover">
  <iframe id="frame"></iframe>
</div>

<script>
setTimeout(()=>{
  splash.style.opacity="0"; 
  setTimeout(()=>splash.style.display="none",1000);
  document.getElementById("socials").style.display="flex"; // mostrar redes después del splash
},1800);

/* MENU */
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");
function openMenu(){sidebar.style.left="0";overlay.style.display="block";}
function closeMenu(){sidebar.style.left="-260px";overlay.style.display="none";}

/* SCROLL */
function goTo(id){
  document.getElementById(id).scrollIntoView({behavior:"smooth"});
  closeMenu();
}

/* PLAYER */
const modal = document.getElementById("modal");
const cover = document.getElementById("cover");
const frame = document.getElementById("frame");
function play(id){
  modal.style.display="flex";
  cover.src=`https://archive.org/services/img/${id}`;
  frame.src=`https://archive.org/embed/${id}`;
}
function cerrar(){modal.style.display="none";frame.src="";cover.src="";}

/* FETCH ARCHIVE */
fetch(`https://archive.org/advancedsearch.php?q=creator:buckle_music AND mediatype:audio&fl[]=identifier,section&rows=50&output=json`)
.then(r=>r.json())
.then(data=>{
  data.response.docs.sort((a,b)=>{
    const getNum = str=>{const match=str.match(/\d+/g); return match?parseInt(match[match.length-1]):0;};
    return getNum(b.identifier)-getNum(a.identifier);
  });
  data.response.docs.forEach(item=>{
    const match=item.identifier.match(/\d+/g);
    const numero=match?match[match.length-1]:"";
    const card=document.createElement("div");
    card.className="card";
    const img=document.createElement("img");
    img.src=`https://archive.org/services/img/${item.identifier}`;
    img.onclick=()=>play(item.identifier);
    const num=document.createElement("div");
    num.className="numero"; num.innerText=numero;
    card.appendChild(img); card.appendChild(num);
    const s=item.section;
    if(s==="nuevo") c1.appendChild(card);
    else if(s==="programas") c2.appendChild(card);
    else if(s==="mix") c3.appendChild(card);
    else if(s==="reserva") c4.appendChild(card);
    else if(s==="producciones") c5.appendChild(card);
  });
});
</script>

</body>
</html>
