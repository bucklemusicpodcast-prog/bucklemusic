<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buckle Music</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Orbitron', sans-serif;
  color:white;
  background:url("fondo.jpg") center/cover fixed;
  scroll-behavior:smooth;
  position:relative;
}

/* Capa oscura sobre fondo */
body::before{
  content:"";
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  z-index:0;
}

/* SPLASH INICIO */
#splash{
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
  background:black;
}
#splash img{
  width:200px; 
  margin-bottom:15px;
}
#splash span{
  font-size:32px;
  color:#00ffe0;
  font-family:'Orbitron', sans-serif;
}

/* BARRA SUPERIOR FIJA */
.topbar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:55px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 15px;
  z-index:1000;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
}
.topbar-left{
  display:flex;
  align-items:center;
}
.topbar-left img{
  width:40px;
  margin-right:10px;
}
.topbar-left .title{
  color:#00ffe0;
  font-size:18px;
}
.topbar .social{
  display:flex;
  gap:10px;
  margin-right:20px;
}
.topbar .social img{
  width:28px;
  transition:0.3s;
}
.topbar .social img:hover{transform:scale(1.2);}

/* SIDEBAR */
.sidebar{
  position:fixed;
  top:0;
  left:-260px; 
  width:260px;
  height:100%;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(15px);
  padding:20px;
  transition:0.4s;
  z-index:999;
}
.sidebar a{
  display:block;
  color:white;
  padding:14px;
  text-decoration:none;
  border-radius:8px;
  margin-bottom:8px;
}
.sidebar a:hover{background:#00ffe0;color:black;}
.overlay-menu{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  z-index:998;
}
.menu-btn{
  font-size:26px;
  cursor:pointer;
  position:fixed;
  top:15px;
  left:15px;
  z-index:1001;
}

/* SECCIONES */
.section{
  padding:10px 20px 10px 20px; /* menos padding vertical */
  position:relative;
  text-align:left; 
  margin-top:20px; /* menos espacio entre secciones */
}
h2{
  color:#00ffe0;
  text-shadow: 2px 2px 10px #000, 0 0 10px #00ffe0;
  margin-bottom:10px; /* menos espacio debajo del título */
  font-size:34px;
  display:block;
  padding-left:20px; /* alinea carruseles con primera letra */
}
h2:hover{color:#00fff0; text-shadow: 2px 2px 10px #000, 0 0 15px #00fff0;}

/* CARRUSEL */
.carousel{
  display:flex;
  overflow-x:auto;
  gap:20px; 
  padding-left:20px; /* alinea con primera letra del título */
  padding-bottom:30px;
}
.card{
  position:relative;
  flex-shrink:0;
}
.card img{
  width:150px; 
  border-radius:12px;
  cursor:pointer;
  transition:0.3s;
}
.card img:hover{transform:scale(1.08);}
.numero{
  position:absolute;
  top:6px;
  left:6px;
  background:rgba(0,0,0,0.8);
  color:#00ffe0;
  font-size:14px;
  padding:4px 8px;
  border-radius:6px;
  font-weight:bold;
}

/* PLAYER */
.player-modal{
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.95);
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:9999;
}
.player-modal img{width:260px;margin-bottom:20px;border-radius:12px;}
.player-modal iframe{width:90%;height:80px;border:none;}
.close{position:absolute;top:20px;right:20px;font-size:25px;cursor:pointer;}

@media(max-width:600px){
  h2{font-size:26px;}
  .card img{width:120px;}
}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <img src="logo-512.png">
  <span>Buckle Music</span>
</div>

<!-- BARRA SUPERIOR -->
<div class="topbar" id="topbar" style="display:none;">
  <div class="topbar-left">
    <img src="logo-512.png">
    <span class="title">Buckle Music</span>
  </div>
  <div class="social">
    <a href="https://www.youtube.com/@BUKLEEMUSIC/streams" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png"></a>
    <a href="https://www.instagram.com/bucklemusic" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384063.png"></a>
    <a href="https://www.facebook.com" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384053.png"></a>
    <a href="https://go.ivoox.com/sq/2535828" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/5968/5968389.png"></a>
  </div>
</div>

<!-- MENU -->
<div class="overlay-menu" id="overlay" onclick="closeMenu()"></div>
<div class="sidebar" id="sidebar">
  <a onclick="goTo('inicio')">Inicio</a>
  <a onclick="goTo('nuevo')">Nuevo Programa</a>
  <a onclick="goTo('programas')">Programas Buckle</a>
  <a onclick="goTo('mix')">In The Mix</a>
  <a onclick="goTo('reserva')">Gran Reserva</a>
  <a onclick="goTo('pro')">Producciones</a>
  <a onclick="goTo('contacto')">Contacto</a>
</div>

<div class="menu-btn" onclick="openMenu()">☰</div>

<!-- CONTENIDO PRINCIPAL -->
<div id="mainContent" style="display:none;">
  <div class="section" id="nuevo"><h2>Nuevo Programa</h2><div class="carousel" id="c1"></div></div>
  <div class="section" id="programas"><h2>Programas Buckle</h2><div class="carousel" id="c2"></div></div>
  <div class="section" id="mix"><h2>In The Mix</h2><div class="carousel" id="c3"></div></div>
  <div class="section" id="reserva"><h2>Gran Reserva</h2><div class="carousel" id="c4"></div></div>
  <div class="section" id="pro"><h2>Producciones</h2><div class="carousel" id="c5"></div></div>
  <div class="section" id="contacto"><h2>Contacto</h2><p style="color:#00ffe0; font-size:18px;">📧 bucklemusicpodcast@gmail.com</p></div>
</div>

<!-- PLAYER -->
<div class="player-modal" id="modal">
  <span class="close" onclick="cerrar()">✖</span>
  <img id="cover">
  <iframe id="frame"></iframe>
</div>

<script>
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");
const topbar = document.getElementById("topbar");
const mainContent = document.getElementById("mainContent");

/* MENU */
function openMenu(){sidebar.style.left="0";overlay.style.display="block";}
function closeMenu(){sidebar.style.left="-260px";overlay.style.display="none";}

/* SCROLL */
function goTo(id){document.getElementById(id).scrollIntoView({behavior:"smooth"});closeMenu();}

/* PLAYER */
const modal = document.getElementById("modal");
const cover = document.getElementById("cover");
const frame = document.getElementById("frame");
function play(id){modal.style.display="flex";cover.src=`https://archive.org/services/img/${id}`;frame.src=`https://archive.org/embed/${id}`;}
function cerrar(){modal.style.display="none";frame.src="";cover.src="";}

/* SPLASH */
setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  topbar.style.display="flex";
  mainContent.style.display="block";
},1800);

/* FETCH ARCHIVE */
fetch(`https://archive.org/advancedsearch.php?q=creator:buckle_music AND mediatype:audio&fl[]=identifier,section&rows=50&output=json`)
.then(r=>r.json())
.then(data=>{
  data.response.docs.sort((a,b)=>{
    const getNum = str=>{const match=str.match(/\d+/g); return match?parseInt(match[match.length-1]):0;};
    return getNum(b.identifier)-getNum(a.identifier);
  });
  data.response.docs.forEach(item=>{
    const match=item.identifier.match(/\d+/g);
    const numero=match?match[match.length-1]:"";
    const card=document.createElement("div");
    card.className="card";
    const img=document.createElement("img");
    img.src=`https://archive.org/services/img/${item.identifier}`;
    img.onclick=()=>play(item.identifier);
    const num=document.createElement("div");
    num.className="numero"; num.innerText=numero;
    card.appendChild(img); card.appendChild(num);
    const s=item.section;
    if(s==="nuevo") c1.appendChild(card);
    else if(s==="programas") c2.appendChild(card);
    else if(s==="mix") c3.appendChild(card);
    else if(s==="reserva") c4.appendChild(card);
    else if(s==="producciones") c5.appendChild(card);
  });
});
</script>

</body>
</html>
